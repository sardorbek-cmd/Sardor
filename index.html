<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leyla Music ❤️</title>

<style>
body{
margin:0;
background:#111;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.bg{
position:fixed;
font-size:40px;
pointer-events:none;
animation:fly linear infinite;
opacity:.8;
}

@keyframes fly{
0%{
transform:translateY(110vh) rotate(0deg);
}
100%{
transform:translateY(-120vh) rotate(360deg);
}
}
.player{
width:320px;
background:#222;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px #ff4da6;
}

img{
width:220px;
height:220px;
border-radius:20px;
object-fit:cover;
margin-bottom:15px;
}

body{
margin:0;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

background:url("bg.jpg") center center/cover no-repeat;
}

button{
padding:12px 18px;
margin:5px;
border:none;
border-radius:50px;
background:#ff4da6;
color:white;
font-size:18px;
cursor:pointer;
}

input{
width:100%;
}
</style>

</head>
<body>

<div class="player">

<img id="cover" src="cover1.jpg">

<h2 id="title">Qo'shiq 1</h2>

<audio id="audio"></audio>

<input type="range" id="progress" value="0">

<br><br>

<button onclick="prev()">⏮</button>
<button onclick="play()">▶️</button>
<button onclick="next()">⏭</button>

</div>

<script>

const icons=["🧸","🎵","🎧","💿","🎼","❤️","🌸"];

function createBg(){

let e=document.createElement("div");

e.className="bg";

e.innerHTML=icons[Math.floor(Math.random()*icons.length)];

e.style.left=Math.random()*100+"vw";

e.style.animationDuration=(6+Math.random()*8)+"s";

e.style.fontSize=(30+Math.random()*40)+"px";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},14000);

}

setInterval(createBg,500);

const songs=[
{
title:"1.Leyla",
music:"music1.mp3",
cover:"cover1.jpg"
},
{
title:"2.Shahzoda-To'rt qadam",
music:"music2.mp3",
cover:"cover2.jpg"
},
{
title:"3.Havada",
music:"music3.mp3",
cover:"cover3.jpg"
},
{
title:"4.Jah khalib-Leila",
music:"music4.mp3",
cover:"cover4.jpg"
}
];

let i=0;

const audio=document.getElementById("audio");

function load(){

document.getElementById("title").innerHTML=songs[i].title;

document.getElementById("cover").src=songs[i].cover;

audio.src=songs[i].music;

}

load();

function play(){

if(audio.paused){

audio.play();

}else{

audio.pause();

}

}

function next(){

i++;

if(i>=songs.length)i=0;

load();

audio.play();

}

function prev(){

i--;

if(i<0)i=songs.length-1;

load();

audio.play();

}

audio.ontimeupdate=function(){

progress.max=audio.duration;

progress.value=audio.currentTime;

}

progress.oninput=function(){

audio.currentTime=progress.value;

}


</script>

</body>
</html>
